name: Build and Release Android APK

on:
  push:
    tags:
      - "v*" # Triggers workflow when you push a tag like v1.0.0

jobs:
  build:
    name: Build APK and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      # 1. Checkout the mobile app repository
      - name: Checkout Mobile App
        uses: actions/checkout@v4

      # 2. Checkout the extractor repository into the workspace
      - name: Checkout Extractor Module
        uses: actions/checkout@v4
        with:
          repository: "Nl-T-lN/kainetic-extractor"
          path: "kainetic-extractor"

      # 3. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 4. Setup Java
      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      # 5. Patch package.json to look inside the workspace, then install dependencies
      - name: Link Extractor and Install NPM dependencies
        run: |
          sed -i 's|\.\./kainetic-extractor|\./kainetic-extractor|g' package.json
          npm install

      # 6. Configure Production App Name & Package
      - name: Apply Production Configurations
        run: |
          jq '.expo.name = "Kainetic" | .expo.android.package = "com.anonymous.kaineticmobile"' app.json > app_tmp.json && mv app_tmp.json app.json

      # 7. Prebuild (Optional but recommended to mimic your local npx expo run:android)
      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean

      # 8. Compile the Android App
      - name: Build Android Release APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew clean
          ./gradlew assembleRelease
        env:
          GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m"

      # 8. Upload the generated APK to the workflow artifacts
      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kainetic-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      # 9. Create a GitHub Release and attach the APK
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
